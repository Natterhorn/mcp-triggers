<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Triggers - Odds Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            margin-bottom: 25px;
            font-size: 1.4em;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #764ba2;
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .face-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .face-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            border: 2px solid #e0e0e0;
        }

        .face-input-group label {
            margin: 0;
            font-size: 0.9em;
            font-weight: 600;
            color: #333;
        }

        .face-input-group input[type="number"] {
            padding: 8px;
            width: 100%;
        }

        .results {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 5px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .result-item {
            margin: 12px 0;
            padding: 12px;
            background: white;
            border-radius: 5px;
        }

        .result-label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .loading {
            display: none;
            text-align: center;
            font-weight: 600;
            margin: 15px 0;
        }

        .loading.active {
            display: block;
        }

        .die-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">           
            <div class="form-group">
                <label for="numDice">Number of Dice (1-20):</label>
                <input type="number" id="numDice" min="1" max="20" value="5">
            </div>

            <div class="form-group">
                <label>Select Target Faces:</label>
                <div class="face-selector" id="faceSelector"></div>
            </div>

            <button onclick="calculateOdds()">Calculate Odds</button>
            <button onclick="resetForm()" style="margin-top: 10px; background: linear-gradient(135deg, #999 0%, #666 100%); ">Reset Form</button>
            <div class="loading" id="loading">Calculating...</div>
            <div class="error" id="error"></div>
            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        // @ts-ignore
        const faces = {{ unique_faces | tojson }};
        
        function initializeFaceSelector() {
            const container = document.getElementById('faceSelector');
            container.innerHTML = '';
            faces.forEach(face => {
                const group = document.createElement('div');
                group.className = 'face-input-group';
                group.innerHTML = `
                    <label>${face}:</label>
                    <input type="number" min="0" max="20" value="0" data-face="${face}">
                `;
                container.appendChild(group);
            });
        }

        async function calculateOdds() {
            const numDice = parseInt(document.getElementById('numDice').value);
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const error = document.getElementById('error');
            
            // Get face counts from inputs
            const targetFaces = {};
            let hasAnyFace = false;
            document.querySelectorAll('[data-face]').forEach(input => {
                const count = parseInt(input.value);
                if (count > 0) {
                    targetFaces[input.dataset.face] = count;
                    hasAnyFace = true;
                }
            });

            if (!hasAnyFace) {
                error.textContent = 'Enter at least one face count!';
                error.classList.add('show');
                results.classList.remove('show');
                return;
            }

            error.classList.remove('show');
            loading.classList.add('active');
            results.classList.remove('show');

            try {
                const response = await fetch('/api/odds', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ num_dice: numDice, target_faces: targetFaces })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to calculate odds');
                }

                const data = await response.json();
                
                let html = '';
                html += `<div class="result-item">
                    <span class="result-label">Target Faces:</span>
                    <span class="result-value">${Object.entries(targetFaces).map(([face, count]) => `${count}x ${face}`).join(', ')}</span>
                </div>`;
                html += `<div class="result-item">
                    <span class="result-label">Probability:</span>
                    <span class="result-value">${data.percentage.toFixed(2)}%</span>
                </div>`;
                
                results.innerHTML = html;
                results.classList.add('show');
            } catch (err) {
                error.textContent = `Error: ${err.message}`;
                error.classList.add('show');
            } finally {
                loading.classList.remove('active');
            }
        }

        function resetForm() {
            // Reset number of dice to 5
            document.getElementById('numDice').value = 5;
            
            // Clear all face inputs to 0
            document.querySelectorAll('[data-face]').forEach(input => {
                input.value = 0;
            });
            
            // Clear error and results
            document.getElementById('error').classList.remove('show');
            document.getElementById('results').classList.remove('show');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeFaceSelector();
        });
    </script>
</body>
</html>
